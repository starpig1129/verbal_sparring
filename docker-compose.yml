services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: verbal_sparring
      POSTGRES_USER: vsuser
      POSTGRES_PASSWORD: vspass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsuser -d verbal_sparring"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16
    environment:
      POSTGRES_DB: verbal_sparring_test
      POSTGRES_USER: vsuser
      POSTGRES_PASSWORD: vspass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsuser -d verbal_sparring_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pg_data:
  ollama_data:

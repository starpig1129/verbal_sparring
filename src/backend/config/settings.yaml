# Default application settings. Env variables and .env file will override these.

# Model provider setup ('ollama' or 'vllm')
model_provider: "ollama"
ollama_url: "http://localhost:11434"
ollama_referee_model: "gemma4:12b"
ollama_player_model: "gemma4:12b"

vllm_url: "http://localhost:8001"
vllm_referee_model: "referee-agent"
vllm_player_model: "player-agent"

referee_temperature: 0.8
player_temperature: 0.9

# Path to the prompts YAML file, relative to repository root
prompts_yaml_path: "src/backend/config/prompts.yaml"

# General settings
access_token_expire_minutes: 10080
